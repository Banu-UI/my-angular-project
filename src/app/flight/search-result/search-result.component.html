<section class="flight-results py-4">
  <div class="container">

    <div class="row">

      <!-- LEFT FILTER -->
      <div class="col-md-3">
        <div class="filter-box p-3 shadow-sm">

          <h5 class="mb-3">Filters</h5>

          <div class="mb-3">
            <label class="form-label">Price Range</label>
            <input type="range" class="form-range">
          </div>

          <div class="mb-3">
            <label class="form-label">Stops</label>
            <div>
              <input type="checkbox"> Non-stop<br>
              <input type="checkbox"> 1 Stop<br>
              <input type="checkbox"> 2+ Stops
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label">Airlines</label>
            <div>
              <input type="checkbox"> Indigo<br>
              <input type="checkbox"> Air India<br>
              <input type="checkbox"> SpiceJet
            </div>
          </div>

        </div>
      </div>

      <!-- RIGHT RESULTS -->
      <div class="col-md-9">

        <!-- FLIGHT CARD -->
        <div class="flight-card mb-3 p-3 shadow-sm">

          <div class="row align-items-center">

            <!-- Airline -->
            <div class="col-md-3 text-center">
              <img src="assets/images/airline.png" class="airline-logo mb-2">
              <p class="mb-0">Indigo</p>
            </div>

            <!-- Timing -->
            <div class="col-md-5 text-center">
              <h5>06:00 AM → 08:30 AM</h5>
              <p class="mb-0">Non Stop • 2h 30m</p>
              <small>BLR → DEL</small>
            </div>

            <!-- Price -->
            <div class="col-md-2 text-center">
              <h5 class="price">₹4,999</h5>
            </div>

            <!-- Button -->
            <div class="col-md-2 text-center">
              <button class="btn btn-primary">Book</button>
            </div>

          </div>

        </div>

        <!-- FLIGHT CARD -->
        <div class="flight-card mb-3 p-3 shadow-sm">

          <div class="row align-items-center">

            <div class="col-md-3 text-center">
              <img src="assets/images/airline.png" class="airline-logo mb-2">
              <p class="mb-0">Air India</p>
            </div>

            <div class="col-md-5 text-center">
              <h5>09:00 AM → 12:30 PM</h5>
              <p class="mb-0">1 Stop • 3h 30m</p>
              <small>BLR → DEL</small>
            </div>

            <div class="col-md-2 text-center">
              <h5 class="price">₹5,499</h5>
            </div>

            <div class="col-md-2 text-center">
              <button class="btn btn-primary">Book</button>
            </div>

          </div>

        </div>

      </div>

    </div>

  </div>
</section>
