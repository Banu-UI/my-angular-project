<div class="container">
      <div class="search-boxin">
  <div class="search-box">


    <!-- Tabs -->
    <ul class="nav nav-tabs justify-content-end mb-3">
      <li class="nav-item">
        <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#flights">
          <i class="fa-solid fa-plane"></i> Flights
        </button>
      </li>
      <li class="nav-item">
        <button class="nav-link" data-bs-toggle="tab" data-bs-target="#hotels">
          <i class="fa-solid fa-hotel"></i> Hotel
        </button>
      </li>
    </ul>

    <h5>Search for Flights</h5>

    <!-- Tab Content -->
    <div class="tab-content mt-3">

      <!-- Flights -->
      <div class="tab-pane fade show active" id="flights">

        <!-- Trip Type -->
        <div class="trip-type mb-3">
          <label><input type="radio" name="trip" checked> One Way</label>
          <label><input type="radio" name="trip"> Round Trip</label>
          <label><input type="radio" name="trip"> Multi City</label>
        </div>

        <!-- Form -->
        <div class="row g-3">

          <div class="col-md-2">
            <input type="text" class="form-control" placeholder="From">
          </div>

          <div class="col-md-2">
            <input type="text" class="form-control" placeholder="To">
          </div>

          <div class="col-md-2">
            <input type="date" class="form-control">
          </div>

          <div class="col-md-2">
            <input type="date" class="form-control">
          </div>

          <div class="col-md-2">
            <select class="form-select">
              <option>1 Adult</option>
              <option>2 Adults</option>
            </select>
          </div>

          <div class="col-md-2 text-center">
            <button class="search-btn">Search</button>
          </div>

        </div>

      </div>

      <!-- Hotels -->
      <div class="tab-pane fade" id="hotels">

        <h5>Search for Hotels</h5>

        <div class="row g-3 mt-2">

          <div class="col-md-3">
            <input type="text" class="form-control" placeholder="City / Hotel">
          </div>

          <div class="col-md-3">
            <input type="date" class="form-control">
          </div>

          <div class="col-md-3">
            <input type="date" class="form-control">
          </div>

          <div class="col-md-3">
            <button class="search-btn w-100">Search Hotel</button>
          </div>

        </div>

      </div>

    </div>

  </div>
</div>
</div>
